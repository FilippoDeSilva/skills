name: Generate Skills Catalog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      DEBUG_SKILLS: "true"   # turn OFF later if you want quiet mode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          cd scripts
          npm install

      # -----------------------------
      # BUILD SKILLS INDEX
      # -----------------------------
      - name: Generate skills catalog
        run: |
          node scripts/build-catalog.mjs

      - name: Copy catalog to root
        run: |
          cp dist/skills.index.json skills-index.json

      # -----------------------------
      # GENERATE SKILLS.MD
      # -----------------------------
      - name: Generate SKILLS.md markdown table
        run: |
          echo "# Available Skills" > SKILLS.md
          echo "" >> SKILLS.md
          echo "| Skill | Version | Author | Description |" >> SKILLS.md
          echo "|-------|---------|---------|-------------|" >> SKILLS.md

          # Read from generated catalog
          for skill in $(jq -r '.[].name' skills-index.json); do
            NAME=$(jq -r --arg s "$skill" '.[] | select(.name == $s) | .name' skills-index.json)
            VERSION=$(jq -r --arg s "$skill" '.[] | select(.name == $s) | .version' skills-index.json)
            AUTHOR=$(jq -r --arg s "$skill" '.[] | select(.name == $s) | .author' skills-index.json)
            DESC=$(jq -r --arg s "$skill" '.[] | select(.name == $s) | .description' skills-index.json)

            DESC_TRUNC=$(echo "$DESC" | head -c 80)
            echo "| $NAME | $VERSION | $AUTHOR | $DESC_TRUNC |" >> SKILLS.md
          done

      # -----------------------------
      # COMMIT
      # -----------------------------
      - name: Commit catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add SKILLS.md skills-index.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update skills catalog (debug-enhanced)"
          git push