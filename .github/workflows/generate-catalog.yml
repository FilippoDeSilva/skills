name: Generate Skills Catalog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          sudo wget -q \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq

          sudo chmod +x /usr/local/bin/yq

      - name: Generate SKILLS.md
        run: |
          {
            echo "# Available Skills"
            echo
            echo "| Skill | Version | Author | Description |"
            echo "|-------|---------|---------|-------------|"

            for file in skills/*/SKILL.md; do
              [ -f "$file" ] || continue

              # safer direct read (NO frontmatter extraction needed here)
              NAME=$(yq -r '.name // empty' "$file" 2>/dev/null || true)

              if [ -z "$NAME" ]; then
                echo "⚠️ Skipping invalid skill: $file"
                continue
              fi

              VERSION=$(yq -r '.version // "0.0.0"' "$file" 2>/dev/null || true)
              AUTHOR=$(yq -r '.author // "unknown"' "$file" 2>/dev/null || true)
              DESCRIPTION=$(yq -r '.description // ""' "$file" 2>/dev/null || true)

              echo "| $NAME | $VERSION | $AUTHOR | $DESCRIPTION |"
            done
          } > SKILLS.md

      - name: Generate skills-index.json (FIXED)
        run: |
          echo "[" > skills-index.json
          FIRST=true

          for file in skills/*/SKILL.md; do
            [ -f "$file" ] || continue

            # direct safe parsing (NO awk, NO temp files)
            NAME=$(yq -r '.name // empty' "$file" 2>/dev/null || true)

            if [ -z "$NAME" ]; then
              echo "⚠️ Skipping broken skill: $file"
              continue
            fi

            VERSION=$(yq -r '.version // "0.0.0"' "$file" 2>/dev/null || true)
            AUTHOR=$(yq -r '.author // "unknown"' "$file" 2>/dev/null || true)
            DESCRIPTION=$(yq -r '.description // ""' "$file" 2>/dev/null || true)
            TAGS=$(yq -o=json '.tags // []' "$file" 2>/dev/null || echo "[]")

            JSON=$(jq -n \
              --arg name "$NAME" \
              --arg version "$VERSION" \
              --arg author "$AUTHOR" \
              --arg description "$DESCRIPTION" \
              --argjson tags "$TAGS" \
              '{name:$name, version:$version, author:$author, description:$description, tags:$tags}')

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> skills-index.json
            fi

            echo "$JSON" >> skills-index.json
          done

          echo "]" >> skills-index.json

      - name: Commit catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add SKILLS.md skills-index.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update skills catalog"
          git push
