name: Generate Skills Catalog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          sudo wget -q \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq

          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Generate SKILLS.md
        run: |
          {
            echo "# Available Skills"
            echo
            echo "| Skill | Version | Author | Description |"
            echo "|-------|---------|---------|-------------|"

            for file in skills/*/SKILL.md; do
              [ -f "$file" ] || continue

              # SAFE YAML read (never crash)
              NAME=$(yq -r '.name // empty' "$file" 2>/dev/null || true)
              VERSION=$(yq -r '.version // "0.0.0"' "$file" 2>/dev/null || true)
              AUTHOR=$(yq -r '.author // "unknown"' "$file" 2>/dev/null || true)
              DESCRIPTION=$(yq -r '.description // ""' "$file" 2>/dev/null || true)

              # skip broken skills
              if [ -z "$NAME" ]; then
                echo "⚠️ Skipping invalid skill file: $file"
                continue
              fi

              echo "| $NAME | $VERSION | $AUTHOR | $DESCRIPTION |"
            done
          } > SKILLS.md

      - name: Generate skills-index.json (ROBUST)
        run: |
          echo "[" > skills-index.json
          FIRST=true

          for file in skills/*/SKILL.md; do
            [ -f "$file" ] || continue

            # extract frontmatter safely
            FRONTMATTER=$(awk '
              BEGIN {in_yaml=0; c=0}
              /^---$/ {c++; if(c==1){in_yaml=1; next} if(c==2){exit}}
              in_yaml {print}
            ' "$file" || true)

            TMP=$(mktemp)
            echo "$FRONTMATTER" > "$TMP"

            NAME=$(yq -r '.name // empty' "$TMP" 2>/dev/null || true)
            VERSION=$(yq -r '.version // "0.0.0"' "$TMP" 2>/dev/null || true)
            AUTHOR=$(yq -r '.author // "unknown"' "$TMP" 2>/dev/null || true)
            DESCRIPTION=$(yq -r '.description // ""' "$TMP" 2>/dev/null || true)

            # tags safe parse
            TAGS=$(yq -o=json '.tags // []' "$TMP" 2>/dev/null || echo "[]")

            rm -f "$TMP"

            # skip broken
            if [ -z "$NAME" ]; then
              echo "⚠️ Skipping broken skill: $file"
              continue
            fi

            JSON=$(jq -n \
              --arg name "$NAME" \
              --arg version "$VERSION" \
              --arg author "$AUTHOR" \
              --arg description "$DESCRIPTION" \
              --argjson tags "$TAGS" \
              '{name:$name, version:$version, author:$author, description:$description, tags:$tags}')

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> skills-index.json
            fi

            echo "$JSON" >> skills-index.json
          done

          echo "]" >> skills-index.json

      - name: Commit generated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add SKILLS.md skills-index.json

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "chore(skills): update catalog"
          git push
