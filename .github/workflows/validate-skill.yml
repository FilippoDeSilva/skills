name: Validate Skills Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  find-skills:
    runs-on: ubuntu-latest

    outputs:
      skills: ${{ steps.find.outputs.skills }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find skills
        id: find
        run: |
          if [ ! -d "skills" ]; then
            echo 'skills=[]' >> $GITHUB_OUTPUT
            exit 0
          fi

          SKILLS=$(find skills -mindepth 2 -type f -name "SKILL.md" \
            -exec dirname {} \; \
            | sed 's|^skills/||' \
            | jq -R . | jq -s -c .)

          echo "skills=$SKILLS" >> $GITHUB_OUTPUT
          echo "Found skills: $SKILLS"

  validate:
    needs: find-skills
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.find-skills.outputs.skills) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate skill
        run: |
          SKILL="${{ matrix.skill }}"
          DIR="skills/$SKILL"
          node scripts/validate-skill.mjs "$DIR"

      - name: Optional README check
        run: |
          SKILL="${{ matrix.skill }}"
          if [ -f "skills/$SKILL/README.md" ]; then
            echo "✓ README exists"
          else
            echo "ℹ README missing (optional)"
          fi
