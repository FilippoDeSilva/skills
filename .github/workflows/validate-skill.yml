name: Validate Skills Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  find-skills:
    runs-on: ubuntu-latest

    outputs:
      skills: ${{ steps.find.outputs.skills }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find skills
        id: find
        run: |
          if [ ! -d "skills" ]; then
            echo 'skills=[]' >> $GITHUB_OUTPUT
            exit 0
          fi

          SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d \
            -exec basename {} \; \
            | jq -R . | jq -s -c .)

          echo "skills=$SKILLS" >> $GITHUB_OUTPUT
          echo "Found skills: $SKILLS"

  validate:
    needs: find-skills
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.find-skills.outputs.skills) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate skill exists
        run: |
          SKILL="${{ matrix.skill }}"
          DIR="skills/$SKILL"
          FILE="$DIR/SKILL.md"

          if [ ! -d "$DIR" ]; then
            echo "❌ Missing directory: $DIR"
            exit 1
          fi

          if [ ! -f "$FILE" ]; then
            echo "❌ Missing SKILL.md in $DIR"
            exit 1
          fi

          echo "✓ Structure valid for $SKILL"

      - name: Validate SKILL.md schema
        run: |
          SKILL="${{ matrix.skill }}"
          FILE="skills/$SKILL/SKILL.md"

          echo "Validating YAML frontmatter..."

          FRONTMATTER=$(awk 'BEGIN {in_yaml=0} /^---$/ {i++; if(i==2) exit; in_yaml=!in_yaml; next} in_yaml {print}' "$FILE")

          echo "$FRONTMATTER" > meta.yaml

          # Extract fields
          NAME=$(yq '.name' meta.yaml)
          DESC=$(yq '.description' meta.yaml)
          VERSION=$(yq '.version' meta.yaml)
          AUTHOR=$(yq '.author' meta.yaml)
          TAGS=$(yq '.tags' meta.yaml)

          # Required fields
          if [ -z "$NAME" ] || [ "$NAME" == "null" ]; then
            echo "❌ Missing name"
            exit 1
          fi

          if [ -z "$DESC" ] || [ "$DESC" == "null" ]; then
            echo "❌ Missing description"
            exit 1
          fi

          # Folder match rule
          if [ "$NAME" != "$SKILL" ]; then
            echo "❌ name mismatch: $NAME != $SKILL"
            exit 1
          fi

          # Version check (semver basic)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ invalid version (must be semver)"
            exit 1
          fi

          echo "✓ schema valid"

      - name: Validate tags format
        run: |
          SKILL="${{ matrix.skill }}"
          FILE="skills/$SKILL/SKILL.md"

          TAGS=$(yq '.tags[]?' "$FILE" 2>/dev/null || true)

          for tag in $TAGS; do
            if ! echo "$tag" | grep -Eq '^[a-z0-9-]+$'; then
              echo "❌ Invalid tag: $tag"
              exit 1
            fi
          done

          echo "✓ tags valid"

      - name: Check README (optional)
        run: |
          SKILL="${{ matrix.skill }}"
          if [ ! -f "skills/$SKILL/README.md" ]; then
            echo "⚠️ README.md missing (optional)"
          else
            echo "✓ README exists"
          fi

  build-catalog:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup yq + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          chmod +x /usr/bin/yq

      - name: Generate skills catalog
        run: |
          mkdir -p dist

          echo "[]" > dist/skills.index.json

          for dir in skills/*; do
            if [ -d "$dir" ]; then

              FILE="$dir/SKILL.md"

              NAME=$(yq '.name' "$FILE")
              DESC=$(yq '.description' "$FILE")
              VERSION=$(yq '.version' "$FILE")
              AUTHOR=$(yq '.author' "$FILE")
              TAGS=$(yq '.tags' "$FILE" | jq -c '. // []')

              jq --arg name "$NAME" \
                 --arg desc "$DESC" \
                 --arg version "$VERSION" \
                 --arg author "$AUTHOR" \
                 --argjson tags "$TAGS" \
                 '. += [{
                    name: $name,
                    description: $desc,
                    version: $version,
                    author: $author,
                    tags: $tags
                 }]' dist/skills.index.json > tmp.json

              mv tmp.json dist/skills.index.json
            fi
          done

          echo "Generated catalog:"
          cat dist/skills.index.json

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: skills-index
          path: dist/skills.index.json
