name: Validate Skills Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  find-skills:
    runs-on: ubuntu-latest

    outputs:
      skills: ${{ steps.find.outputs.skills }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find skills
        id: find
        run: |
          if [ ! -d "skills" ]; then
            echo 'skills=[]' >> $GITHUB_OUTPUT
            exit 0
          fi

          SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d \
            -exec basename {} \; \
            | jq -R . | jq -s -c .)

          echo "skills=$SKILLS" >> $GITHUB_OUTPUT
          echo "Found skills: $SKILLS"


  validate:
    needs: find-skills
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.find-skills.outputs.skills) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate skill exists
        run: |
          SKILL="${{ matrix.skill }}"
          DIR="skills/$SKILL"
          FILE="$DIR/SKILL.md"

          if [ ! -d "$DIR" ]; then
            echo "❌ Missing directory: $DIR"
            exit 1
          fi

          if [ ! -f "$FILE" ]; then
            echo "❌ Missing SKILL.md in $DIR"
            exit 1
          fi

          echo "✓ Structure valid for $SKILL"

      - name: Validate SKILL.md schema
        run: |
          SKILL="${{ matrix.skill }}"
          FILE="skills/$SKILL/SKILL.md"

          echo "Validating YAML frontmatter..."

          FRONTMATTER=$(awk 'BEGIN {in_yaml=0} /^---$/ {i++; if(i==2) exit; in_yaml=!in_yaml; next} in_yaml {print}' "$FILE")

          echo "$FRONTMATTER" > meta.yaml

          # Extract fields
          NAME=$(yq '.name' meta.yaml)
          DESC=$(yq '.description' meta.yaml)
          VERSION=$(yq '.version' meta.yaml)
          AUTHOR=$(yq '.author' meta.yaml)

          # Required fields
          if [ -z "$NAME" ] || [ "$NAME" == "null" ]; then
            echo "❌ Missing name"
            exit 1
          fi

          if [ -z "$DESC" ] || [ "$DESC" == "null" ]; then
            echo "❌ Missing description"
            exit 1
          fi

          # Folder match rule
          if [ "$NAME" != "$SKILL" ]; then
            echo "❌ name mismatch: $NAME != $SKILL"
            exit 1
          fi

          # Version check (semver)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ invalid version (must be semver)"
            exit 1
          fi

          echo "✓ schema valid"


      - name: Validate tags format
        run: |
          SKILL="${{ matrix.skill }}"
          FILE="skills/$SKILL/SKILL.md"

          TAGS=$(yq '.tags[]?' "$FILE" 2>/dev/null || true)

          for tag in $TAGS; do
            if ! echo "$tag" | grep -Eq '^[a-z0-9-]+$'; then
              echo "❌ Invalid tag: $tag"
              exit 1
            fi
          done

          echo "✓ tags valid"


      - name: Check README (optional)
        run: |
          SKILL="${{ matrix.skill }}"

          if [ ! -f "skills/$SKILL/README.md" ]; then
            echo "⚠️ README.md missing (optional)"
          else
            echo "✓ README exists"
          fi


  build-catalog:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install ajv

      - name: Build skills catalog
        run: node scripts/build-catalog.mjs

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: skills-index
          path: dist/skills.index.json
