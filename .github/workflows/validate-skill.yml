name: Validate Skills Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  find-skills:
    runs-on: ubuntu-latest

    outputs:
      skills: ${{ steps.find.outputs.skills }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find skills
        id: find
        run: |
          if [ ! -d "skills" ]; then
            echo 'skills=[]' >> $GITHUB_OUTPUT
            exit 0
          fi

          SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d \
            -exec basename {} \; \
            | jq -R . | jq -s -c .)

          echo "skills=$SKILLS" >> $GITHUB_OUTPUT
          echo "Found skills: $SKILLS"

  validate:
    needs: find-skills
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.find-skills.outputs.skills) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Validate structure
        run: |
          SKILL="${{ matrix.skill }}"
          DIR="skills/$SKILL"
          FILE="$DIR/SKILL.md"

          if [ ! -d "$DIR" ]; then
            echo "❌ Missing directory: $DIR"
            exit 1
          fi

          if [ ! -f "$FILE" ]; then
            echo "❌ Missing SKILL.md"
            exit 1
          fi

          echo "✓ structure valid"

      - name: Validate YAML schema (tolerant)
        run: |
          SKILL="${{ matrix.skill }}"
          FILE="skills/$SKILL/SKILL.md"

          FRONTMATTER=$(awk '
            BEGIN {in_yaml=0; c=0}
            /^---$/ {c++; if(c==1){in_yaml=1; next} if(c==2){exit}}
            in_yaml {print}
          ' "$FILE")

          TMP=$(mktemp)
          echo "$FRONTMATTER" > "$TMP"

          NAME=$(yq -r '.name // ""' "$TMP" 2>/dev/null)
          VERSION=$(yq -r '.version // "0.0.0"' "$TMP" 2>/dev/null)
          AUTHOR=$(yq -r '.author // "unknown"' "$TMP" 2>/dev/null)

          if [ -z "$NAME" ]; then
            echo "❌ Missing name"
            exit 1
          fi

          if [ "$NAME" != "$SKILL" ]; then
            echo "❌ name mismatch: $NAME != $SKILL"
            exit 1
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ invalid version"
            exit 1
          fi

          rm -f "$TMP"

          echo "✓ schema valid"

      - name: Validate tags (optional)
        run: |
          SKILL="${{ matrix.skill }}"
          FILE="skills/$SKILL/SKILL.md"

          TAGS=$(yq -r '.tags[]? // empty' "$FILE" 2>/dev/null || true)

          for tag in $TAGS; do
            if ! echo "$tag" | grep -Eq '^[a-z0-9-]+$'; then
              echo "❌ Invalid tag: $tag"
              exit 1
            fi
          done

          echo "✓ tags valid"

      - name: Optional README check
        run: |
          SKILL="${{ matrix.skill }}"
          if [ -f "skills/$SKILL/README.md" ]; then
            echo "✓ README exists"
          else
            echo "ℹ README missing (optional)"
          fi
