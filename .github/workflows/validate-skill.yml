name: Validate Skills

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  find-skills:
    runs-on: ubuntu-latest

    outputs:
      skills: ${{ steps.find-skills.outputs.skills }}

    steps:
      - uses: actions/checkout@v4

      - name: Find all skills
        id: find-skills
        run: |
          if [ ! -d "skills" ]; then
            echo 'skills=[]' >> $GITHUB_OUTPUT
            exit 0
          fi

          SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d \
            | xargs -n1 basename \
            | jq -R . \
            | jq -s -c .)

          echo "skills=$SKILLS" >> $GITHUB_OUTPUT

          echo "Found skills:"
          echo "$SKILLS"

  validate:
    needs: find-skills

    if: ${{ needs.find-skills.outputs.skills != '[]' }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.find-skills.outputs.skills) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -q \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq

          sudo chmod +x /usr/local/bin/yq

      - name: Validate skill
        run: |
          SKILL="${{ matrix.skill }}"
          DIR="skills/$SKILL"
          FILE="$DIR/SKILL.md"

          echo "Validating $SKILL"

          test -d "$DIR" || {
            echo "Directory missing"
            exit 1
          }

          test -f "$FILE" || {
            echo "SKILL.md missing"
            exit 1
          }

          test -f "$DIR/README.md" || {
            echo "README.md missing"
            exit 1
          }

      - name: Validate frontmatter
        run: |
          FILE="skills/${{ matrix.skill }}/SKILL.md"

          NAME=$(yq '.name' "$FILE")
          DESCRIPTION=$(yq '.description' "$FILE")
          VERSION=$(yq '.version' "$FILE")
          AUTHOR=$(yq '.author' "$FILE")
          TAGS=$(yq '.tags' "$FILE")

          [ "$NAME" != "null" ] || {
            echo "name missing"
            exit 1
          }

          [ "$DESCRIPTION" != "null" ] || {
            echo "description missing"
            exit 1
          }

          [ "$VERSION" != "null" ] || {
            echo "version missing"
            exit 1
          }

          [ "$AUTHOR" != "null" ] || {
            echo "author missing"
            exit 1
          }

          [ "$TAGS" != "null" ] || {
            echo "tags missing"
            exit 1
          }

      - name: Validate description length
        run: |
          FILE="skills/${{ matrix.skill }}/SKILL.md"

          DESCRIPTION=$(yq '.description' "$FILE")

          LENGTH=${#DESCRIPTION}

          if [ "$LENGTH" -lt 10 ]; then
            echo "Description too short"
            exit 1
          fi

          if [ "$LENGTH" -gt 1024 ]; then
            echo "Description too long"
            exit 1
          fi

      - name: Validate version
        run: |
          FILE="skills/${{ matrix.skill }}/SKILL.md"

          VERSION=$(yq '.version' "$FILE")

          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "Version must use semantic versioning"
            exit 1
          }

      - name: Validate tags
        run: |
          FILE="skills/${{ matrix.skill }}/SKILL.md"

          COUNT=$(yq '.tags | length' "$FILE")

          if [ "$COUNT" -lt 1 ]; then
            echo "At least one tag required"
            exit 1
          fi

      - name: Validate folder name
        run: |
          SKILL="${{ matrix.skill }}"

          echo "$SKILL" | grep -qE '^[a-z0-9]+(-[a-z0-9]+)*$' || {
            echo "Invalid folder name"
            exit 1
          }

      - name: Success
        run: |
          echo "✓ Skill validated successfully"
