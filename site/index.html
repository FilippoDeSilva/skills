<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filippo's Skills</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Filippo's Agentic Skills</h1>
      <p class="subtitle">Production-ready AI skills for modern software engineering</p>
      <div class="stats">
        <span id="skill-count">0 Skills</span>
        <span id="category-count">0 Categories</span>
        <span id="last-updated">Generated --</span>
      </div>
    </header>

    <div class="search-container">
      <input type="text" id="search" placeholder="Search skills..." autocomplete="off">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
      </div>
    </div>

    <div class="skills-grid" id="skills-grid"></div>

    <footer>
      <p>Generated from <a href="https://github.com/FilippoDeSilva/skills">FilippoDeSilva/skills</a></p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
