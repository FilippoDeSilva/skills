<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filippo's Skills</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1>Filippo's Agentic Skills</h1>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="10" cy="10" r="4"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        </button>
      </div>
      <p class="subtitle">Production-ready AI skills for modern software engineering</p>
      <div class="stats-container">
        <div class="stat-item">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16v16H4z"/>
            <path d="M9 9h6v6H9z"/>
            <path d="M9 1v3M15 1v3M9 16v3M15 16v3M1 9h3M16 9h3M1 15h3M16 15h3"/>
          </svg>
          <span id="skill-count">0 Skills</span>
        </div>
        <div class="stat-item">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="10" cy="10" r="4"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2"/>
          </svg>
          <span id="last-updated">Generated --</span>
        </div>
      </div>
    </header>

    <div class="search-container">
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Search..." autocomplete="off">
        <kbd class="kbd-shortcut">⌘K</kbd>
      </div>
    </div>

    <div class="skills-grid" id="skills-grid"></div>

    <footer>
      <p>Generated from <a href="https://github.com/FilippoDeSilva/skills">FilippoDeSilva/skills</a></p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
