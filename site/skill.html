<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Detail</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="back-link">← Back to Skills</a>
      <h1 id="skill-name">Loading...</h1>
    </header>

    <div class="skill-detail">
      <div class="skill-sidebar">
        <div class="meta-section">
          <h3>Description</h3>
          <p id="skill-description"></p>
        </div>
        <div class="meta-section">
          <h3>Version</h3>
          <p id="skill-version"></p>
        </div>
        <div class="meta-section">
          <h3>Author</h3>
          <p id="skill-author"></p>
        </div>
        <div class="meta-section">
          <h3>Tags</h3>
          <div class="tags" id="skill-tags"></div>
        </div>
        <div class="meta-section">
          <h3>Metadata</h3>
          <div id="skill-metadata"></div>
        </div>
      </div>

      <div class="skill-content">
        <button class="copy-button" id="copy-button" title="Copy full markdown">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          Copy
        </button>
        <div id="skill-markdown"></div>
      </div>
    </div>

    <footer>
      <p>Generated from <a href="https://github.com/FilippoDeSilva/skills">FilippoDeSilva/skills</a></p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="skill.js"></script>
</body>
</html>
