name: Build AGENTS.md

on:
  push:
    branches: [main]
    paths:
      - 'rules/**'
      - 'metadata.json'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Build AGENTS.md
        run: npm run build
        working-directory: scripts

      - name: Commit AGENTS.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md
          git diff --staged --quiet || git commit -m "chore: update AGENTS.md [skip ci]"
          git push
